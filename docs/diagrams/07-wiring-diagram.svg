<svg viewBox="0 0 900 540" xmlns="http://www.w3.org/2000/svg" font-family="Apple SD Gothic Neo, AppleGothic, Noto Sans KR, sans-serif">
  <rect x="0" y="0" width="900" height="540" fill="#ffffff"/>

  <!-- Title -->
  <text x="450" y="34" text-anchor="middle" font-size="22" font-weight="700" fill="#1F1147">회로 연결 (Arduino Uno)</text>
  <text x="450" y="56" text-anchor="middle" font-size="13" fill="#6B7280">초음파 센서(HC-SR04)와 신호등 LED 모듈을 아래와 같이 연결합니다</text>

  <!-- ===================== WIRES (draw under blocks) ===================== -->
  <g stroke-width="3" fill="none" stroke-linecap="round">
    <!-- 5V -> VCC : red -->
    <path d="M320,195 L580,160" stroke="#E53935"/>
    <!-- D2 -> Trig : purple -->
    <path d="M320,235 L580,195" stroke="#8917E0"/>
    <!-- D3 -> Echo : blue -->
    <path d="M320,275 L580,230" stroke="#1E88E5"/>
    <!-- GND -> HC GND : black -->
    <path d="M320,315 L580,265" stroke="#374151"/>
    <!-- GND -> module GND : black -->
    <path d="M320,315 L580,360" stroke="#374151"/>
    <!-- D13 -> R (red) : orange, solid (사용) -->
    <path d="M320,355 L580,392" stroke="#FB8C00"/>
    <!-- D12 -> Y : gray dashed (미사용) -->
    <path d="M320,395 L580,424" stroke="#9CA3AF" stroke-dasharray="6 5"/>
    <!-- D11 -> G : gray dashed (미사용) -->
    <path d="M320,435 L580,456" stroke="#9CA3AF" stroke-dasharray="6 5"/>
  </g>

  <!-- ===================== ARDUINO UNO ===================== -->
  <rect x="70" y="150" width="250" height="300" rx="14" fill="#F3E8FF" stroke="#8917E0" stroke-width="2.5"/>
  <text x="190" y="184" text-anchor="middle" font-size="19" font-weight="700" fill="#1F1147">Arduino Uno</text>
  <line x1="90" y1="196" x2="290" y2="196" stroke="#C4B5FD" stroke-width="1"/>

  <!-- Arduino pin pads on right edge (label to the left) -->
  <g font-size="13" font-weight="600" fill="#1F1147">
    <text x="306" y="200" text-anchor="end">5V</text>
    <circle cx="320" cy="195" r="6" fill="#fff" stroke="#E53935" stroke-width="2.5"/>

    <text x="306" y="240" text-anchor="end">D2</text>
    <circle cx="320" cy="235" r="6" fill="#fff" stroke="#8917E0" stroke-width="2.5"/>

    <text x="306" y="280" text-anchor="end">D3</text>
    <circle cx="320" cy="275" r="6" fill="#fff" stroke="#1E88E5" stroke-width="2.5"/>

    <text x="306" y="320" text-anchor="end">GND</text>
    <circle cx="320" cy="315" r="6" fill="#fff" stroke="#374151" stroke-width="2.5"/>

    <text x="306" y="360" text-anchor="end">D13</text>
    <circle cx="320" cy="355" r="6" fill="#fff" stroke="#FB8C00" stroke-width="2.5"/>

    <text x="306" y="400" text-anchor="end" fill="#9CA3AF">D12</text>
    <circle cx="320" cy="395" r="6" fill="#fff" stroke="#9CA3AF" stroke-width="2.5"/>

    <text x="306" y="440" text-anchor="end" fill="#9CA3AF">D11</text>
    <circle cx="320" cy="435" r="6" fill="#fff" stroke="#9CA3AF" stroke-width="2.5"/>
  </g>

  <!-- ===================== HC-SR04 ===================== -->
  <rect x="580" y="80" width="250" height="200" rx="14" fill="#F3E8FF" stroke="#8917E0" stroke-width="2.5"/>
  <text x="705" y="112" text-anchor="middle" font-size="17" font-weight="700" fill="#1F1147">HC-SR04</text>
  <text x="705" y="132" text-anchor="middle" font-size="13" fill="#6B7280">초음파 센서</text>

  <!-- HC pads on left edge (label to the right) -->
  <g font-size="14" font-weight="600" fill="#1F1147">
    <circle cx="580" cy="160" r="6" fill="#fff" stroke="#E53935" stroke-width="2.5"/>
    <text x="596" y="165" text-anchor="start">VCC</text>

    <circle cx="580" cy="195" r="6" fill="#fff" stroke="#8917E0" stroke-width="2.5"/>
    <text x="596" y="200" text-anchor="start">Trig</text>

    <circle cx="580" cy="230" r="6" fill="#fff" stroke="#1E88E5" stroke-width="2.5"/>
    <text x="596" y="235" text-anchor="start">Echo</text>

    <circle cx="580" cy="265" r="6" fill="#fff" stroke="#374151" stroke-width="2.5"/>
    <text x="596" y="270" text-anchor="start">GND</text>
  </g>

  <!-- ===================== 신호등 LED 모듈 ===================== -->
  <rect x="580" y="300" width="250" height="170" rx="14" fill="#F3E8FF" stroke="#8917E0" stroke-width="2.5"/>
  <text x="690" y="326" text-anchor="middle" font-size="15" font-weight="700" fill="#1F1147">신호등 LED 모듈</text>
  <text x="690" y="344" text-anchor="middle" font-size="11" fill="#6B7280">빨강(R)만 사용</text>

  <!-- terminals on left edge -->
  <g font-size="13" font-weight="600">
    <circle cx="580" cy="360" r="6" fill="#fff" stroke="#374151" stroke-width="2.5"/>
    <text x="596" y="365" text-anchor="start" fill="#1F1147">GND</text>

    <circle cx="580" cy="392" r="6" fill="#fff" stroke="#FB8C00" stroke-width="2.5"/>
    <text x="596" y="397" text-anchor="start" fill="#1F1147">R (빨강)</text>

    <circle cx="580" cy="424" r="6" fill="#fff" stroke="#9CA3AF" stroke-width="2.5"/>
    <text x="596" y="429" text-anchor="start" fill="#9CA3AF">Y · 미사용</text>

    <circle cx="580" cy="456" r="6" fill="#fff" stroke="#9CA3AF" stroke-width="2.5"/>
    <text x="596" y="461" text-anchor="start" fill="#9CA3AF">G · 미사용</text>
  </g>

  <!-- traffic-light housing with 3 LEDs (vertical) -->
  <rect x="772" y="372" width="34" height="92" rx="8" fill="#1F2937"/>
  <circle cx="789" cy="392" r="9" fill="#EF4444"/>
  <circle cx="789" cy="418" r="9" fill="#FACC15" opacity="0.45"/>
  <circle cx="789" cy="444" r="9" fill="#22C55E" opacity="0.45"/>

  <!-- ===================== LEGEND ===================== -->
  <g font-size="12" fill="#374151">
    <rect x="70" y="480" width="760" height="52" rx="10" fill="#FAF5FF" stroke="#E9D5FF" stroke-width="1"/>
    <!-- row 1 -->
    <line x1="92" y1="500" x2="120" y2="500" stroke="#E53935" stroke-width="3" stroke-linecap="round"/>
    <text x="128" y="504">5V (전원)</text>
    <line x1="222" y1="500" x2="250" y2="500" stroke="#374151" stroke-width="3" stroke-linecap="round"/>
    <text x="258" y="504">GND (접지)</text>
    <line x1="362" y1="500" x2="390" y2="500" stroke="#8917E0" stroke-width="3" stroke-linecap="round"/>
    <text x="398" y="504">Trig (D2)</text>
    <line x1="492" y1="500" x2="520" y2="500" stroke="#1E88E5" stroke-width="3" stroke-linecap="round"/>
    <text x="528" y="504">Echo (D3)</text>
    <!-- row 2 -->
    <line x1="92" y1="520" x2="120" y2="520" stroke="#FB8C00" stroke-width="3" stroke-linecap="round"/>
    <text x="128" y="524">R 신호 (D13, 사용)</text>
    <line x1="282" y1="520" x2="310" y2="520" stroke="#9CA3AF" stroke-width="3" stroke-linecap="round" stroke-dasharray="6 5"/>
    <text x="318" y="524">미사용 Y · G (D12 · D11)</text>
  </g>
</svg>

<svg viewBox="0 0 900 540" xmlns="http://www.w3.org/2000/svg" font-family="Apple SD Gothic Neo, AppleGothic, Noto Sans KR, sans-serif">
  <rect x="0" y="0" width="900" height="540" fill="#ffffff"/>

  <!-- Title -->
  <text x="450" y="34" text-anchor="middle" font-size="22" font-weight="700" fill="#1F1147">회로 연결 (Arduino Uno)</text>
  <text x="450" y="56" text-anchor="middle" font-size="13" fill="#6B7280">초음파 센서(HC-SR04)와 LED를 아래와 같이 연결합니다</text>

  <!-- ===================== WIRES (draw under blocks) ===================== -->
  <g stroke-width="3" fill="none" stroke-linecap="round">
    <!-- 5V -> VCC : red -->
    <path d="M320,200 L580,160" stroke="#E53935"/>
    <!-- D2 -> Trig : purple -->
    <path d="M320,255 L580,195" stroke="#8917E0"/>
    <!-- D3 -> Echo : blue -->
    <path d="M320,310 L580,230" stroke="#1E88E5"/>
    <!-- GND -> HC GND : black -->
    <path d="M320,365 L580,265" stroke="#374151"/>
    <!-- GND -> LED cathode : black -->
    <path d="M320,365 L580,445" stroke="#374151"/>
    <!-- D13 -> LED anode(input) : orange -->
    <path d="M320,420 L580,375" stroke="#FB8C00"/>
  </g>

  <!-- ===================== ARDUINO UNO ===================== -->
  <rect x="70" y="150" width="250" height="300" rx="14" fill="#F3E8FF" stroke="#8917E0" stroke-width="2.5"/>
  <text x="190" y="184" text-anchor="middle" font-size="19" font-weight="700" fill="#1F1147">Arduino Uno</text>
  <line x1="90" y1="196" x2="290" y2="196" stroke="#C4B5FD" stroke-width="1"/>

  <!-- Arduino pin pads on right edge (label to the left) -->
  <g font-size="14" font-weight="600" fill="#1F1147">
    <text x="306" y="205" text-anchor="end">5V</text>
    <circle cx="320" cy="200" r="6" fill="#fff" stroke="#E53935" stroke-width="2.5"/>

    <text x="306" y="260" text-anchor="end">D2</text>
    <circle cx="320" cy="255" r="6" fill="#fff" stroke="#8917E0" stroke-width="2.5"/>

    <text x="306" y="315" text-anchor="end">D3</text>
    <circle cx="320" cy="310" r="6" fill="#fff" stroke="#1E88E5" stroke-width="2.5"/>

    <text x="306" y="370" text-anchor="end">GND</text>
    <circle cx="320" cy="365" r="6" fill="#fff" stroke="#374151" stroke-width="2.5"/>

    <text x="306" y="425" text-anchor="end">D13</text>
    <circle cx="320" cy="420" r="6" fill="#fff" stroke="#FB8C00" stroke-width="2.5"/>
  </g>

  <!-- ===================== HC-SR04 ===================== -->
  <rect x="580" y="80" width="250" height="200" rx="14" fill="#F3E8FF" stroke="#8917E0" stroke-width="2.5"/>
  <text x="705" y="112" text-anchor="middle" font-size="17" font-weight="700" fill="#1F1147">HC-SR04</text>
  <text x="705" y="132" text-anchor="middle" font-size="13" fill="#6B7280">초음파 센서</text>

  <!-- HC pads on left edge (label to the right) -->
  <g font-size="14" font-weight="600" fill="#1F1147">
    <circle cx="580" cy="160" r="6" fill="#fff" stroke="#E53935" stroke-width="2.5"/>
    <text x="596" y="165" text-anchor="start">VCC</text>

    <circle cx="580" cy="195" r="6" fill="#fff" stroke="#8917E0" stroke-width="2.5"/>
    <text x="596" y="200" text-anchor="start">Trig</text>

    <circle cx="580" cy="230" r="6" fill="#fff" stroke="#1E88E5" stroke-width="2.5"/>
    <text x="596" y="235" text-anchor="start">Echo</text>

    <circle cx="580" cy="265" r="6" fill="#fff" stroke="#374151" stroke-width="2.5"/>
    <text x="596" y="270" text-anchor="start">GND</text>
  </g>

  <!-- ===================== LED + RESISTOR ===================== -->
  <rect x="580" y="320" width="250" height="150" rx="14" fill="#F3E8FF" stroke="#8917E0" stroke-width="2.5"/>
  <text x="705" y="346" text-anchor="middle" font-size="15" font-weight="700" fill="#1F1147">LED + 220Ω 저항</text>

  <!-- terminals -->
  <circle cx="580" cy="375" r="6" fill="#fff" stroke="#FB8C00" stroke-width="2.5"/>
  <text x="596" y="370" text-anchor="start" font-size="12" fill="#6B7280">애노드(+)</text>
  <circle cx="580" cy="445" r="6" fill="#fff" stroke="#374151" stroke-width="2.5"/>
  <text x="596" y="440" text-anchor="start" font-size="12" fill="#6B7280">캐소드(−) · GND</text>

  <!-- series path: input -> resistor -> LED -> cathode -> GND -->
  <g stroke="#374151" stroke-width="2.5" fill="none" stroke-linecap="round">
    <path d="M580,375 H648"/>
    <!-- resistor zigzag -->
    <path d="M648,375 L654,366 L666,384 L678,366 L690,384 L702,366 L708,375"/>
    <path d="M708,375 H730"/>
    <!-- LED cathode bar -->
    <path d="M762,361 V389"/>
    <!-- wire from cathode down to GND terminal -->
    <path d="M762,375 H795 V445 H580"/>
  </g>
  <!-- LED anode triangle -->
  <polygon points="730,361 730,389 762,375" fill="#FFD54F" stroke="#374151" stroke-width="2.5" stroke-linejoin="round"/>
  <text x="678" y="356" text-anchor="middle" font-size="11" fill="#6B7280">220Ω</text>
  <text x="746" y="412" text-anchor="middle" font-size="11" fill="#6B7280">LED</text>

  <!-- ===================== LEGEND ===================== -->
  <g font-size="12" fill="#374151">
    <rect x="70" y="478" width="760" height="44" rx="10" fill="#FAF5FF" stroke="#E9D5FF" stroke-width="1"/>
    <line x1="92" y1="500" x2="120" y2="500" stroke="#E53935" stroke-width="3" stroke-linecap="round"/>
    <text x="128" y="504">5V (전원)</text>
    <line x1="210" y1="500" x2="238" y2="500" stroke="#374151" stroke-width="3" stroke-linecap="round"/>
    <text x="246" y="504">GND (접지)</text>
    <line x1="340" y1="500" x2="368" y2="500" stroke="#8917E0" stroke-width="3" stroke-linecap="round"/>
    <text x="376" y="504">Trig (D2)</text>
    <line x1="470" y1="500" x2="498" y2="500" stroke="#1E88E5" stroke-width="3" stroke-linecap="round"/>
    <text x="506" y="504">Echo (D3)</text>
    <line x1="600" y1="500" x2="628" y2="500" stroke="#FB8C00" stroke-width="3" stroke-linecap="round"/>
    <text x="636" y="504">LED 신호 (D13)</text>
  </g>
</svg>
